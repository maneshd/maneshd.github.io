<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta http-equiv="X-UA-Compatible" content="IE=edge"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Random Notes Generator</title><link rel="stylesheet" href="/style.css"/><script type="module" src="script.js" defer="defer"></script><script defer="defer" src="rng.bundle.js"></script><script defer="defer" src="sfplayer.bundle.js"></script><link href="css/rng.47fe0a0e95d87c21a875.css" rel="stylesheet"></head><body><script src="soundfont-player.js"></script><div class="centered"><h1 style="text-align:center">RNG</h1><p>A Random Notes Generator which highlights repetitions in the sequence.</p><div class="play-container"><button class="the-butt" id="toggle">Play</button></div><div class="settings-title">Settings</div><div class="settings" id="settings"><div class="input-container"><span class="explain-text">Speed:</span><br/><input type="range" min="20" , max="100" value="60" class="slider" id="speed"/></div><div class="input-container"><span class="explain-text">How to handle repeated notes:</span><br/><input type="radio" id="noRepeats" name="repeatOption" value="noRepeats" checked="checked"/> <label for="noRepeats">Don't repeat a note twice in a row</label><br/><input type="radio" id="allowRepeats" name="repeatOption" value="allowRepeats"/> <label for="allowRepeats">Allow repeating a note twice in a row</label><br/><input type="radio" id="holdRepeats" name="repeatOption" value="holdRepeats"/> <label for="holdRepeats">If a note would repeat, hold it instead</label><br/></div><div class="input-container"><span class="explain-text">How to treat the first half of a repeated sequence:</span><br/><input type="checkbox" id="leftLouder" name="leftOption" value="louder" checked="checked"/> <label for="noRepeats">Play it louder</label><br/><input type="checkbox" id="leftAddInstrument" name="leftOption" value="addInstrument" checked="checked"/> <label for="allowRepeats">Play it on another instrument</label><br/><input type="checkbox" id="leftOctaveHigher" name="leftOption" value="octaveHigher"/> <label for="holdRepeats">Play it an octave higher</label><br/></div><div class="input-container"><span class="explain-text">How to treat the second half of a repeated sequence:</span><br/><input type="checkbox" id="rightLouder" name="rightOption" value="louder" checked="checked"/> <label for="noRepeats">Play it louder</label><br/><input type="checkbox" id="rightAddInstrument" name="rightOption" value="addInstrument" checked="checked"/> <label for="allowRepeats">Play it on another instrument</label><br/><input type="checkbox" id="rightOctaveHigher" name="rightOption" value="octaveHigher" checked="checked"/> <label for="holdRepeats">Play it an octave higher</label><br/></div><div class="input-container"><span class="explain-text">Which pitches to chose from:</span><br/><input type="radio" id="majorPentatonic" name="pitchSet" value="majorPentatonic" checked="checked"/> <label for="majorPentatonic">Major pentatonic scale</label><br/><input type="radio" id="majorPentatonicFlat7" name="pitchSet" value="majorPentatonicFlat7"/> <label for="majorPentatonicFlat7">Major pentatonic scale, plus a flag 7th</label><br/><input type="radio" id="minorPentatonic" name="pitchSet" value="minorPentatonic"/> <label for="minorPentatonic">Minor pentatonic scale</label><br/><input type="radio" id="octatonic" name="pitchSet" value="octatonic"/> <label for="octatonic">Octatonic scale</label><br/><input type="radio" id="wholeTone" name="pitchSet" value="wholeTone"/> <label for="wholeTone">Whole tone scale</label><br/><input type="radio" id="customScale" name="pitchSet" value="customScale"/> <label for="customScale">Custom (choose at least 3 pitches)</label><br/><div id="keyboard-container"></div></div></div></div></body></html>
